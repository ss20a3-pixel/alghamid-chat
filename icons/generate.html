<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icon Generator</title>
<script>
const sizes = [72,96,128,144,152,192,384,512];
function generateIcons() {
  sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, size, size);
    bg.addColorStop(0, '#7C3AED');
    bg.addColorStop(1, '#EC4899');
    ctx.fillStyle = bg;
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();
    // Mic icon
    const cx = size / 2, cy = size / 2;
    const mw = size * 0.15, mh = size * 0.28, mr = size * 0.08;
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    // Mic body
    ctx.beginPath();
    ctx.roundRect(cx - mw/2, cy - mh/2, mw, mh, mr);
    ctx.fill();
    // Mic stand
    ctx.strokeStyle = 'rgba(255,255,255,0.95)';
    ctx.lineWidth = size * 0.04;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(cx, cy + mh*0.05, mw * 1.3, Math.PI, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy + mh * 0.05 + mw * 1.3);
    ctx.lineTo(cx, cy + mh * 0.05 + mw * 1.3 + size * 0.08);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - size*0.1, cy + mh * 0.05 + mw * 1.3 + size * 0.08);
    ctx.lineTo(cx + size*0.1, cy + mh * 0.05 + mw * 1.3 + size * 0.08);
    ctx.stroke();

    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
  document.getElementById('status').textContent = 'تم توليد جميع الأيقونات! ضعها في مجلد icons/';
}
</script>
</head>
<body style="font-family:Arial;direction:rtl;text-align:center;padding:40px;background:#0A0A0F;color:white">
  <h2>مولّد أيقونات صوتي</h2>
  <p>اضغط الزر لتوليد وتنزيل جميع الأيقونات المطلوبة</p>
  <button onclick="generateIcons()" style="padding:14px 28px;background:linear-gradient(135deg,#7C3AED,#EC4899);border:none;border-radius:12px;color:white;font-size:16px;cursor:pointer;margin-top:16px">
    توليد الأيقونات
  </button>
  <p id="status" style="margin-top:16px;color:#10B981"></p>
</body>
</html>
